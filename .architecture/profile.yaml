# Convention profile (iteration 8): the project's ARCHITECTURE ONTOLOGY as data.
#
# This is the single artifact that "honors the existing structure". The agents
# read their vocabulary from here instead of baking one framework's ontology
# (DDD) into prose. boundaries.yaml stays the per-module dependency RULES; this
# file is the ontology META on top: what framework, which layer plays which
# role, what to call things, and how signatures are spelled.
#
# The harness is FRAMEWORK-AGNOSTIC: nothing in it branches on a framework name.
# It reasons in the universal axes below (language, layer ROLES, vocabulary,
# signature idiom). Any project fills these in; there is no built-in list of
# frameworks to recognize. `label` is a free-text human note only.
#
# Schema:
#   label           : a free-text human note for this project (e.g. "python-ddd",
#                     "flask app"). NOTHING branches on it; it is documentation.
#   language        : the primary language.
#   source_root     : the code root the deterministic checks target, relative to
#                     the repo root (e.g. "src"). `harness check` resolves all
#                     check paths from this instead of hardcoding a directory.
#   detected_from   : evidence the profile was seeded from (manifests, layout).
#   roles           : mapping of ABSTRACT harness role -> this project's layer
#                     name. The agents reason in roles; the profile resolves them
#                     to concrete layers:
#                       behavior_layer       : where business behavior lives.
#                       boundary_shape_layer : where cross-boundary payloads are defined.
#                       entrypoint_layer     : use cases / orchestration entry points.
#                       io_layer             : external systems, frameworks, tools.
#   vocabulary      : the NOUNS agents should use when proposing changes:
#                       boundary_shape : what a cross-boundary payload is called here.
#                       behavior_unit  : what a unit of business behavior is called here.
#   signature_idiom : how seam signatures are spelled in this language (recorded
#                     here in iteration 8; the semantic normalizer that makes the
#                     diff compare meaning rather than exact text is iteration 9).
label: python-ddd   # free-text note only; nothing branches on it
language: python
source_root: src
detected_from:
  - requirements.txt
  - "src/ layered layout (domain/contracts/application/adapters)"
roles:
  behavior_layer: domain
  boundary_shape_layer: contracts
  entrypoint_layer: application
  io_layer: adapters
vocabulary:
  boundary_shape: "contract class (frozen dataclass under src/contracts/)"
  behavior_unit: "domain class or method under src/domain/"
signature_idiom:
  contract: "ClassName(field: Type, ...)"
  method: "Class.method(param: Type, ...) -> Return"
